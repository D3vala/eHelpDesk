<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - eHelpDesk</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #ffffff;
        color: #111111;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .signup-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        max-width: 420px;
        height: 700px;
        text-align: center;
      }

      /* Logo Block */
      .logo-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 40px;
        width: 100%;
      }

      .logo-block .logo-icon {
        font-size: 52px;
        color: #111;
        line-height: 1;
        margin-bottom: 8px;
      }

      .logo-block .logo-text {
        font-size: 24px;
        font-weight: 800;
        color: #111;
        letter-spacing: -0.5px;
      }

      /* Form Content */
      .form-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      h1 {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 8px;
        text-align: center;
        width: 100%;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 28px;
        line-height: 1.5;
        text-align: center;
        width: 100%;
      }

      /* Form Fields */
      .field-group {
        width: 100%;
        text-align: left;
        margin-bottom: 16px;
      }

      .field-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #111;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #eaeaea;
        border-radius: 10px;
        background: #ffffff;
        font-size: 14px;
        color: #111;
        outline: none;
        transition: border-color 0.2s;
      }

      input::placeholder {
        color: #999;
      }

      input:focus {
        border-color: #111;
      }

      /* Password Requirements */
      .password-requirements {
        width: 100%;
        font-size: 12px;
        color: #666;
        margin-bottom: 16px;
        text-align: left;
      }

      .requirement {
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .requirement.valid {
        color: #28a745;
      }

      .requirement.invalid {
        color: #666;
      }

      /* Error Message */
      .error-message {
        width: 100%;
        background: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
        display: none;
      }

      /* Success Message */
      .success-message {
        width: 100%;
        background: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
        display: none;
      }

      /* Primary Button */
      .btn-primary {
        width: 100%;
        padding: 14px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
        opacity: 1;
        pointer-events: auto;
      }

      .btn-primary:hover {
        background: #333;
      }

      .btn-primary:disabled {
        background: #ccc;
        cursor: not-allowed;
        opacity: 0.6;
        pointer-events: none;
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        width: 100%;
        margin: 24px 0;
        color: #888;
        font-size: 13px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #eaeaea;
      }

      /* Bottom texts */
      .bottom-divider {
        width: 100%;
        height: 1px;
        background: #eaeaea;
        margin: 32px 0 24px;
      }

      .bottom-text {
        font-size: 13px;
        color: #666;
      }
      .bottom-text span {
        font-weight: 700;
        color: #111;
        cursor: pointer;
      }

      /* Loading Overlay */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
      }

      #loading-overlay .loader-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
      }

      #loading-overlay .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px auto;
      }

      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- LOADING OVERLAY -->
    <div id="loading-overlay">
      <div class="loader-content">
        <div class="spinner"></div>
        <div>Creating account...</div>
      </div>
    </div>

    <div class="signup-container">
      <div class="logo-block">
        <div class="logo-icon"><i class="fa-solid fa-headset"></i></div>
        <span class="logo-text">eHelpDesk</span>
      </div>

      <div class="form-content">
        <h1>Create an account</h1>
        <p class="subtitle">Use your school email to get started.</p>

        <!-- Error Message -->
        <div id="error-message" class="error-message"></div>
        
        <!-- Success Message -->
        <div id="success-message" class="success-message"></div>

        <div class="field-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Juan Dela Cruz" />
        </div>

        <div class="field-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" placeholder="name@mymail.mapua.edu.ph" />
        </div>

        <div class="field-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 8 characters" />
          <div class="password-requirements">
            <div class="requirement" id="req-length">
              <i class="fa-solid fa-circle"></i> At least 8 characters
            </div>
            <div class="requirement" id="req-uppercase">
              <i class="fa-solid fa-circle"></i> At least one uppercase letter
            </div>
            <div class="requirement" id="req-lowercase">
              <i class="fa-solid fa-circle"></i> At least one lowercase letter
            </div>
            <div class="requirement" id="req-number">
              <i class="fa-solid fa-circle"></i> At least one number
            </div>
          </div>
        </div>

        <button class="btn-primary" id="signup-btn" onclick="handleSignUp()">Create account</button>

        <div class="bottom-divider"></div>
        <p class="bottom-text">
          Already have an account?
          <span onclick="window.location.href='login.html'">Sign in</span>
        </p>
      </div>
    </div>

    <script>
      import { supabase } from './supabase-config.js';

      // Password validation
      const passwordInput = document.getElementById('signup-password');
      const requirements = {
        length: document.getElementById('req-length'),
        uppercase: document.getElementById('req-uppercase'),
        lowercase: document.getElementById('req-lowercase'),
        number: document.getElementById('req-number')
      };

      passwordInput.addEventListener('input', validatePassword);

      function validatePassword() {
        const password = passwordInput.value;
        
        // Check length
        if (password.length >= 8) {
          requirements.length.classList.add('valid');
          requirements.length.classList.remove('invalid');
          requirements.length.innerHTML = '<i class="fa-solid fa-check-circle"></i> At least 8 characters';
        } else {
          requirements.length.classList.add('invalid');
          requirements.length.classList.remove('valid');
          requirements.length.innerHTML = '<i class="fa-solid fa-circle"></i> At least 8 characters';
        }

        // Check uppercase
        if (/[A-Z]/.test(password)) {
          requirements.uppercase.classList.add('valid');
          requirements.uppercase.classList.remove('invalid');
          requirements.uppercase.innerHTML = '<i class="fa-solid fa-check-circle"></i> At least one uppercase letter';
        } else {
          requirements.uppercase.classList.add('invalid');
          requirements.uppercase.classList.remove('valid');
          requirements.uppercase.innerHTML = '<i class="fa-solid fa-circle"></i> At least one uppercase letter';
        }

        // Check lowercase
        if (/[a-z]/.test(password)) {
          requirements.lowercase.classList.add('valid');
          requirements.lowercase.classList.remove('invalid');
          requirements.lowercase.innerHTML = '<i class="fa-solid fa-check-circle"></i> At least one lowercase letter';
        } else {
          requirements.lowercase.classList.add('invalid');
          requirements.lowercase.classList.remove('valid');
          requirements.lowercase.innerHTML = '<i class="fa-solid fa-circle"></i> At least one lowercase letter';
        }

        // Check number
        if (/\d/.test(password)) {
          requirements.number.classList.add('valid');
          requirements.number.classList.remove('invalid');
          requirements.number.innerHTML = '<i class="fa-solid fa-check-circle"></i> At least one number';
        } else {
          requirements.number.classList.add('invalid');
          requirements.number.classList.remove('valid');
          requirements.number.innerHTML = '<i class="fa-solid fa-circle"></i> At least one number';
        }
      }

      // Show loading overlay
      function showLoading() {
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('signup-btn').disabled = true;
      }

      // Hide loading overlay
      function hideLoading() {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('signup-btn').disabled = false;
      }

      // Show error message
      function showError(message) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        hideLoading();
      }

      // Show success message
      function showSuccess(message) {
        const successDiv = document.getElementById('success-message');
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        hideLoading();
      }

      // Handle sign-up
      async function handleSignUp() {
        console.log('Sign up button clicked');
        
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim().toLowerCase();
        const password = document.getElementById('signup-password').value;

        console.log('Form values:', { name, email, password });

        // Validation
        if (!name || !email || !password) {
          showError('Please fill in all fields.');
          return;
        }

        if (!email.includes('@mapua.edu.ph') && !email.includes('@mymail.mapua.edu.ph')) {
          showError('Please use a Mapúa email address.');
          return;
        }

        // Password strength validation
        if (password.length < 8 || !/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
          showError('Password must meet all requirements.');
          return;
        }

        console.log('Validation passed, showing loading...');
        showLoading();

        try {
          console.log('Attempting Supabase sign up...');
          // Sign up with Supabase Auth
          const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: {
                full_name: name
              }
            }
          });

          console.log('Supabase response:', { data, error });

          if (error) {
            throw error;
          }

          if (data.user) {
            console.log('User created, creating profile...');
            // Auto-create user profile
            await createUserProfile(email, name);
            showSuccess('Account created successfully! Please check your email for verification.');
            
            // Redirect to login after 3 seconds
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 3000);
          } else {
            showError('Please check your email for verification instructions.');
          }
        } catch (error) {
          console.error('Sign up error:', error);
          showError(error.message || 'An error occurred during sign up. Please try again.');
        }
      }

      // Create user profile in database
      async function createUserProfile(email, fullName) {
        try {
          // Determine role based on email
          let role = 'student';
          if (email.includes('admin@') || email.includes('administrator@')) {
            role = 'admin';
          } else if (email.includes('staff@') || email.includes('faculty@')) {
            role = 'staff';
          }

          // Determine department
          let department = 'General';
          if (email.includes('soit@') || email.includes('it@')) {
            department = 'SOIT';
          } else if (email.includes('doit@')) {
            department = 'DOIT';
          } else if (email.includes('registrar@')) {
            department = 'Registrar';
          }

          const { data, error } = await supabase
            .from('users')
            .insert({
              email: email,
              full_name: fullName,
              role: role,
              department: department,
              status: 'active'
            })
            .select()
            .single();

          if (error) {
            console.error('Error creating user profile:', error);
          }

          return data;
        } catch (error) {
          console.error('Error in createUserProfile:', error);
          return null;
        }
      }
    </script>
  </body>
</html>
